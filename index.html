<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ewidencja Czasu Pracy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#0f0f11;--bg2:#17171a;--bg3:#1e1e23;--border:#2a2a32;--border2:#38383f;
  --text:#f0f0f2;--text2:#8888a0;--text3:#55556a;
  --accent:#7c6af7;--accent2:#5b52cc;
  --green:#3dd68c;--green2:#1a7a4a;
  --amber:#f5a623;--amber2:#7a4a00;
  --red:#f25c5c;--red2:#2a0f0f;
  --violet:#c084fc;--violet2:#5b21b6;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px 10px;position:sticky;top:0;z-index:10}
.header-title{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);font-family:var(--mono)}
.header-sub{font-size:17px;font-weight:600;color:var(--text);margin-top:1px}
.main{padding:16px;max-width:480px;margin:0 auto}
.tabs{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:3px;gap:3px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;min-width:52px;padding:7px 2px;border:none;background:transparent;border-radius:var(--rs);font-size:10px;font-family:var(--sans);font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;text-align:center;line-height:1.3}
.tab.active{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.tab svg{display:block;margin:0 auto 2px}
.screen{display:none}.screen.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-family:var(--mono);margin-bottom:12px}
/* UPLOAD */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3);position:relative;overflow:hidden;margin-bottom:12px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:#1a1826}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;font-size:16px}
.upload-icon{font-size:30px;margin-bottom:8px}
.upload-label{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px}
.upload-sub{font-size:12px;color:var(--text2)}
/* METRICS */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px}
.metric-label{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em}
.metric-value{font-size:22px;font-weight:600;color:var(--text);font-family:var(--mono);line-height:1}
.metric-unit{font-size:12px;color:var(--text2);margin-left:2px;font-weight:400}
.metric.c-green{border-color:var(--green2)}.metric.c-green .metric-value{color:var(--green)}
.metric.c-purple{border-color:var(--accent2)}.metric.c-purple .metric-value{color:var(--accent)}
.metric.c-amber{border-color:var(--amber2)}.metric.c-amber .metric-value{color:var(--amber)}
.metric.c-violet{border-color:var(--violet2)}.metric.c-violet .metric-value{color:var(--violet)}
/* SETTING ROWS */
.srow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.srow-label{font-size:13px;color:var(--text)}
.srow-sub{font-size:10px;color:var(--text2);margin-top:2px}
.sinput{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:var(--mono);font-size:13px;font-weight:500;padding:6px 10px;width:100px;text-align:right;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.sinput:focus{border-color:var(--accent)}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:5px 6px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.wknd td{background:#1a1710}
.tbl tr.holy td{background:#1a1020}
/* PILLS */
.pill{display:inline-block;font-size:9px;padding:2px 6px;border-radius:20px;font-family:var(--mono);font-weight:500}
.pill-ok{background:#0f2318;color:var(--green);border:1px solid #1a3a28}
.pill-over{background:#2a1f00;color:var(--amber);border:1px solid #3a2d00}
.pill-sat{background:#2a1d00;color:var(--amber);border:1px solid var(--amber2)}
.pill-sun{background:var(--red2);color:var(--red);border:1px solid #5a2a2a}
.pill-holy{background:#1a0a2a;color:var(--violet);border:1px solid var(--violet2)}
/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:11px;border:1px solid var(--border2);border-radius:var(--rs);background:transparent;color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:8px}
.btn:hover{background:var(--bg3);border-color:var(--accent)}.btn:active{transform:scale(.98)}
.btn.b-accent{background:var(--accent2);border-color:var(--accent);color:#fff}.btn.b-accent:hover{background:var(--accent)}
.btn.b-green{background:var(--green2);border-color:var(--green);color:var(--green)}.btn.b-green:hover{background:#255a3a}
.btn.b-red{color:var(--red);border-color:#5a2a2a}
/* ALERTS */
.alert{padding:10px 12px;border-radius:var(--rs);font-size:12px;margin-bottom:12px;display:none;line-height:1.5}
.alert.show{display:block}
.alert-ok{background:#0e2018;border:1px solid var(--green2);color:var(--green)}
.alert-err{background:var(--red2);border:1px solid #5a2a2a;color:var(--red)}
.alert-info{background:#14121e;border:1px solid var(--accent2);color:var(--accent)}
/* PROGRESS */
.prog-wrap{margin:10px 0}
.prog-head{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px;font-family:var(--mono)}
.prog-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s ease}
.prog-fill.green{background:var(--green)}
/* SCROLLABLE CHART */
.chart-scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;cursor:grab;border-radius:var(--rs)}
.chart-scroll-wrap:active{cursor:grabbing}
.chart-inner{display:flex;gap:5px;align-items:flex-end;height:80px;padding-bottom:2px;min-width:max-content;padding:4px 0 2px}
.bc-col{display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;width:26px;flex-shrink:0}
.bc-bar{width:18px;border-radius:2px 2px 0 0;min-height:2px}
.bc-val{font-size:8px;color:var(--text3);font-family:var(--mono)}
.bc-lbl{font-size:8px;font-family:var(--mono)}
/* SUMMARY */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--border);margin-top:4px}
.sum-label{font-size:11px;color:var(--text2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em}
.sum-val{font-size:14px;font-weight:600;color:var(--text);font-family:var(--mono)}
.sum-val.green{color:var(--green)}.sum-val.amber{color:var(--amber)}.sum-val.red{color:var(--red)}.sum-val.violet{color:var(--violet)}
/* FORM */
.frow{margin-bottom:10px}
.flabel{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:var(--mono);margin-bottom:5px;display:block}
.finput,.fselect{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:var(--mono);font-size:16px;padding:8px 10px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.finput:focus,.fselect:focus{border-color:var(--accent)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
/* HISTORY */
.hist-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.hist-month{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.hist-month-name{font-family:var(--mono)}
.hist-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.hist-metric{background:var(--bg3);border-radius:var(--rs);padding:8px}
.hist-label{font-size:9px;color:var(--text3);font-family:var(--mono);margin-bottom:3px;text-transform:uppercase;letter-spacing:.07em}
.hist-val{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--text)}
.hist-val.green{color:var(--green)}.hist-val.amber{color:var(--amber)}.hist-val.violet{color:var(--violet)}
/* SPINNER */
.spinner{display:none;text-align:center;padding:16px;font-size:12px;color:var(--text2)}
.spinner.show{display:block}
.spin-ring{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:9px 16px;border-radius:24px;font-size:12px;font-weight:500;opacity:0;transition:all .22s;z-index:100;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.norm-info{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--text2);font-family:var(--mono);margin-bottom:10px;line-height:1.7}
